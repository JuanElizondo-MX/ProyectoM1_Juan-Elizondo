 <!DOCTYPE html>
 <html lang="es">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colorfly Studio</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">

 </head>

    <body>
        <header>
            <img src="img/Logo-Colorfly-Studio.png" alt="Logo Colorfly Studio" class="logo">
                <h1 class="texto-neon">Colorfly Studio</h1>
                <h2 class="texto-neon">Generador de Paletas de Color</h2>

        </header>

            <main>
                <p class="texto-neon">Bienvenido a Colorfly Studio, tu herramienta definitiva
                    para crear y generar paletas de colores aleatorias</p>
                
                    <div class="fila-controles">

                    <div class="selector-colores">
                    <p class="texto-neon">Cantidad de Colores</p>
                    <div class="botones">
                        <button>6</button>
                        <button>8</button>
                            <button>9</button>
                    </div>

                    </div>

                <div class="formato-de-colores">
                    <p class="texto-neon">Formato de Color</p>
                        <div class="botones">
                        <button>HLS</button>
                        <button>HEX</button>
                    </div>

                </div>

                    <div class="generar-paleta">
                        <button>Generar Paleta</button>
                    </div>

                </div>

            </main>

            <footer>
                <p class="texto-neon">© 2026 Colorfly Studio. Todos los derechos reservados.</p>
            </footer>

            <script src="script.js"></script>
    </body>
</html>
